# VeriSoftBench Evaluation — Aleph Prover (patch-based connector)
#
# Reads pre-downloaded patches from patches/ dir, uses GPT-5.4 to extract proofs.
#
# Before running: download patches with download_patches.py
#
# Required env vars:
#   OPENAI_API_KEY   — for GPT-5.4 proof extraction
#
# Paths assume:
#   ~/verisoftbench-repos/   — this repo (results JSON, patches/)
#   ~/VeriSoftBench-eval/    — cloned benchmark repo (this config goes in configs/)
#   verisoftbench-lean       — clean Docker container

model_name: patch
model_id: aleph-prover-patch
extraction_model_id: gpt-5.4
num_samples: 1

# Paths (adjust to your setup)
results_json: ../verisoftbench-repos/verisoftbench_final_results.json
patches_dir: ../verisoftbench-repos/patches

fix_enabled: false
mode: filtered_context

locator_file: verisoftbench.jsonl
max_workers: 8

lean_backend: docker
docker_container: verisoftbench-lean

run_name: aleph-prover-patch
